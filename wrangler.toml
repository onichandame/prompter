name = "prompt-vault"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2024-04-18"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[[routes]]
pattern = "prompter.onidame.qzz.io"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "prompt-vault-db"
database_id = "e40f21c1-dbd5-405f-b5e8-21bbf563148e"
migrations_dir = "drizzle/migrations"
